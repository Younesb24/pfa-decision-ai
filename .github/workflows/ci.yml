name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — lint, type-check, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pfa
          POSTGRES_PASSWORD: pfa_local_2026
          POSTGRES_DB: pfa_olist
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest httpx
          pip install -r api/requirements.txt

      - name: Ruff lint
        run: ruff check api ml scripts

      - name: Mypy type check (api only)
        run: mypy api --ignore-missing-imports || true  # advisory until type debt cleared

      - name: Pytest (unit only — skip integration)
        run: pytest -m "not integration and not llm"
        env:
          POSTGRES_HOST: localhost

  dbt:
    name: dbt — parse + compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install dbt-core dbt-postgres

      - name: dbt parse
        working-directory: dbt_project
        run: dbt parse --no-version-check
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_project

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
